<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quiz Vrai ou Faux — SHS</title>
<link rel="stylesheet" href="../shared/style.css">
<script src="../shared/scorm_api.js"></script>
<style>
  :root { --module-color: #2C3E72; }
  .vf-btns { display: flex; gap: 14px; margin-top: 18px; }
  .vf-btn { padding: 12px 30px; border-radius: 8px; border: 2px solid var(--module-color); font-size: 1rem; font-weight: 700; cursor: pointer; transition: all .15s; background: #fff; font-family: 'Segoe UI', sans-serif; }
  .vf-btn:hover:not(:disabled) { background: var(--module-color); color: #fff; }
  .vf-btn.sel-true  { background: #1E7A45; border-color: #1E7A45; color: #fff; }
  .vf-btn.sel-false { background: #8B2020; border-color: #8B2020; color: #fff; }
  .vf-btn:disabled  { opacity: .5; cursor: not-allowed; }
  .quote { font-style: italic; background: var(--indigo-l); border-radius: 6px; padding: 10px 14px; margin-bottom: 14px; color: #2C3E72; font-size: 0.92rem; border-left: 3px solid var(--indigo); }
  .q-text { font-size: 1.05rem; font-weight: 600; }
  .complete-banner { display:none; background: var(--success); color:#fff; border-radius:10px; padding:14px 20px; text-align:center; font-weight:700; margin-bottom:14px; }
</style>
</head>
<body>
<div class="sco-wrapper">
  <div class="sco-header" style="--module-color:#2C3E72">
    <span class="icon">📚</span>
    <div>
      <h1>Module 1 — Qui est chercheur en SHS ?</h1>
      <div class="subtitle">Activité 1.1 — Quiz Vrai ou Faux</div>
    </div>
    <div class="badge">🏅 Badge : Curieux</div>
  </div>

  <div class="sco-main">
    <div class="complete-banner" id="complete-banner">✅ Activité complétée — votre progression est enregistrée !</div>
    <div class="step-indicator" id="dots"></div>

    <div class="card" id="quiz-card">
      <div class="card-title" id="q-num">Question 1 / 10</div>
      <div class="quote" id="q-quote"></div>
      <div class="q-text" id="q-text"></div>
      <div class="vf-btns">
        <button class="vf-btn" id="btn-v" onclick="answer(true)">✅ VRAI</button>
        <button class="vf-btn" id="btn-f" onclick="answer(false)">❌ FAUX</button>
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="nav-bar">
        <span class="step-count" id="step-count">0 / 10 répondues</span>
        <button class="btn btn-primary" id="btn-next" onclick="next()" style="display:none">Suivant →</button>
      </div>
    </div>

    <div class="card score-panel" id="score-card" style="display:none">
      <div class="score-circle"><span class="score-num" id="score-num">—</span><span class="score-label">/ 10</span></div>
      <h2 id="res-title" style="margin-bottom:8px"></h2>
      <p id="res-msg" style="color:#555;max-width:420px;margin:0 auto 18px"></p>
      <button class="btn btn-primary" onclick="restart()">🔄 Rejouer</button>
    </div>
  </div>
  <div class="sco-footer"><span>MOOC Portraits de Chercheurs — SHS &amp; Linguistique</span><span id="footer"></span></div>
</div>
<script>
const questions = [
  { quote:'"La recherche en SHS, ce n\'est pas vraiment scientifique."',
    text:'Les sciences humaines et sociales ne sont pas considérées comme des sciences.',
    answer:false, feedback:'FAUX. Les SHS sont des disciplines scientifiques à part entière, avec des méthodes rigoureuses : enquêtes, corpus, ethnographie, modélisation, archives. Elles sont reconnues par le CNRS, l\'ANR et les grandes agences de recherche internationales.' },
  { quote:'"Un linguiste, ça ne fait qu\'analyser des fautes de grammaire."',
    text:'La linguistique se limite à l\'étude de la grammaire normative.',
    answer:false, feedback:'FAUX. La linguistique couvre des domaines très variés : phonétique, sémantique, sociolinguistique, pragmatique, linguistique computationnelle, neurolinguistique, acquisition du langage, dialectologie… C\'est une science fondamentale aux croisements de nombreuses disciplines.' },
  { quote:'"En SHS, on peut faire une thèse financée."',
    text:'Il est possible d\'obtenir un financement pour une thèse en sciences humaines et sociales.',
    answer:true, feedback:'VRAI. Des contrats doctoraux existent dans les universités, à l\'EHESS, au CNRS (SHS), à l\'INED. Des bourses ANR, CIFRE en SHS (conseil, musées, médias), ou régionales financent également des thèses. Le financement est moins systématique qu\'en sciences dures, mais bien réel.' },
  { quote:'"Un sociologue ne peut travailler qu\'à l\'université."',
    text:'Les chercheurs en sociologie travaillent uniquement dans le monde académique.',
    answer:false, feedback:'FAUX. Les sociologues travaillent dans les instituts de sondage (IFOP, BVA), les collectivités territoriales, les ONG, les ministères (DREES, DRESS), les cabinets de conseil RH, les entreprises (études utilisateurs, DRH), les musées ou les médias.' },
  { quote:'"La linguistique computationnelle, c\'est la même chose que l\'IA."',
    text:'Linguistique computationnelle et intelligence artificielle sont deux disciplines identiques.',
    answer:false, feedback:'FAUX, mais elles sont très proches ! La linguistique computationnelle modélise formellement le langage humain ; l\'IA est un ensemble de techniques d\'apprentissage. Le traitement automatique des langues (TAL/NLP) est à leur intersection. Un linguiste et un informaticien travaillent souvent ensemble.' },
  { quote:'"En histoire, on ne produit que des connaissances sur le passé."',
    text:'Les recherches historiques n\'ont d\'utilité que pour comprendre le passé.',
    answer:false, feedback:'FAUX. L\'histoire sert à comprendre le présent, à déconstruire les mythes, à éclairer les politiques publiques et les mémoires collectives. L\'histoire du temps présent (post-1945) est un champ très dynamique avec des enjeux sociaux directs.' },
  { quote:'"La thèse en SHS est toujours plus courte qu\'en sciences exactes."',
    text:'Une thèse en sciences humaines dure moins longtemps qu\'une thèse en sciences expérimentales.',
    answer:false, feedback:'FAUX. Une thèse en SHS dure en moyenne 4 à 6 ans, souvent plus qu\'en sciences expérimentales (3 à 4 ans). La collecte de données (archives, terrain ethnographique, corpus) et la rédaction longue du manuscrit expliquent cette durée.' },
  { quote:'"Les chercheurs en anthropologie passent leur temps en terrain exotique."',
    text:'L\'anthropologie se pratique uniquement dans des sociétés lointaines ou "exotiques".',
    answer:false, feedback:'FAUX. L\'anthropologie contemporaine s\'applique aussi aux sociétés occidentales : anthropologie des organisations, des pratiques numériques, des hôpitaux, des banlieues, des religions minoritaires… Le "terrain" peut être au coin de la rue.' },
  { quote:'"Une chercheuse en psychologie sociale fait forcément des expériences en labo."',
    text:'La psychologie sociale repose uniquement sur des expériences en laboratoire.',
    answer:false, feedback:'FAUX. La psychologie sociale utilise diverses méthodes : expériences de terrain, enquêtes par questionnaires, entretiens, observations naturalistes, analyses de données numériques (réseaux sociaux). Les expériences de labo ne sont qu\'une méthode parmi d\'autres.' },
  { quote:'"Il faut savoir plusieurs langues étrangères pour faire de la recherche en linguistique."',
    text:'La connaissance de plusieurs langues étrangères est un atout majeur pour un chercheur en linguistique.',
    answer:true, feedback:'VRAI. Un linguiste qui ne connaît qu\'une seule langue manque de recul comparatif. Connaître plusieurs langues (y compris des langues non-européennes) permet de comprendre la diversité des structures linguistiques et d\'accéder aux corpus et littératures internationales.' },
];

let cur = 0, score = 0, done = 0, finished = false;

function buildDots() {
  document.getElementById('dots').innerHTML = questions.map((_,i) =>
    `<div class="step-dot" id="d${i}"></div>`).join('');
}
function updDots() {
  questions.forEach((_,i) => {
    const d = document.getElementById(`d${i}`);
    d.className = 'step-dot'+(i<cur?' done':i===cur?' active':'');
  });
}
function load(i) {
  const q = questions[i];
  document.getElementById('q-num').textContent = `Question ${i+1} / ${questions.length}`;
  document.getElementById('q-quote').textContent = q.quote;
  document.getElementById('q-text').textContent = q.text;
  ['btn-v','btn-f'].forEach(id => { const b=document.getElementById(id); b.className='vf-btn'; b.disabled=false; });
  document.getElementById('btn-next').style.display='none';
  const fb=document.getElementById('feedback'); fb.style.display='none'; fb.className='feedback';
  updDots();
}
function answer(val) {
  const q = questions[cur];
  const ok = val === q.answer;
  if (ok) score++;
  done++;
  document.getElementById('btn-v').disabled=true;
  document.getElementById('btn-f').disabled=true;
  if (val===true)  document.getElementById('btn-v').className='vf-btn '+(ok?'sel-true':'sel-false');
  if (val===false) document.getElementById('btn-f').className='vf-btn '+(ok?'sel-false':'sel-true');
  if (q.answer===true  && val!==true)  document.getElementById('btn-v').className='vf-btn sel-true';
  if (q.answer===false && val!==false) document.getElementById('btn-f').className='vf-btn sel-false';
  const fb=document.getElementById('feedback');
  fb.textContent=(ok?'✅ Correct ! ':'❌ Incorrect. ')+q.feedback;
  fb.className='feedback '+(ok?'correct':'incorrect'); fb.style.display='block';
  document.getElementById('step-count').textContent=`${done} / ${questions.length} répondues`;
  const bn=document.getElementById('btn-next');
  bn.style.display='inline-block';
  bn.textContent=cur<questions.length-1?'Question suivante →':'Voir le résumé →';
}
function next() {
  if (cur<questions.length-1) { cur++; load(cur); }
  else showScore();
}
function showScore() {
  document.getElementById('quiz-card').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-num').textContent=score;
  document.getElementById('res-title').textContent=score>=7?'🎉 Excellent ! Badge Curieux débloqué !':'📚 Bon début ! Quelques idées reçues à travailler.';
  document.getElementById('res-msg').textContent=`Vous avez ${score}/10 bonnes réponses. Toutes les réponses ont été enregistrées — l'activité est complétée.`;
  document.getElementById('footer').textContent=`Score : ${score}/10`;
  if (!finished) { finished=true; complete(); }
}
function complete() {
  document.getElementById('complete-banner').style.display='block';
  SCORM.finish();
}
function restart() {
  cur=0; score=0; done=0;
  document.getElementById('quiz-card').style.display='block';
  document.getElementById('score-card').style.display='none';
  document.getElementById('step-count').textContent='0 / 10 répondues';
  buildDots(); load(0);
}
buildDots(); load(0);
</script>
</body>
</html>
